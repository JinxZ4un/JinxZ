<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Strive Performance System</title>
    <script>
      // Guard against fetch override errors in sanboxed environments (like the AI Studio preview iframe)
      (function() {
        try {
          const originalFetch = window.fetch;
          let customFetch = originalFetch;
          Object.defineProperty(window, 'fetch', {
            get() {
              return customFetch;
            },
            set(val) {
              customFetch = val;
            },
            configurable: true,
            enumerable: true
          });
          if (typeof globalThis !== 'undefined' && globalThis !== window) {
            Object.defineProperty(globalThis, 'fetch', {
              get() {
                return customFetch;
              },
              set(val) {
                customFetch = val;
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn("Failed to patch fetch property descriptors:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
